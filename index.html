<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Point 43 — Arena Comercial</title>
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-database-compat.js"></script>
<style>
:root{
  --bg:#0A0A0A;--surface:#141414;--card:#1C1C1C;--card2:#222;
  --gold:#D4AF37;--gold-l:#F0CB5A;--gold-d:#8A7220;
  --green:#4CAF50;--red:#FF5555;--amber:#F0A500;
  --text:#F0F0F0;--muted:#555;--muted2:#888;
  --r:14px;--rs:8px;--nav:62px;
}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
html{font-size:16px}
body{background:var(--bg);color:var(--text);font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif;min-height:100vh;padding-bottom:calc(var(--nav)+8px)}
.app-header{background:var(--surface);border-bottom:1px solid #1E1E1E;padding:12px 16px 10px;position:sticky;top:0;z-index:200}
.hdr-top{display:flex;justify-content:space-between;align-items:center;margin-bottom:10px}
.logo{font-size:17px;font-weight:800;color:var(--gold);letter-spacing:1px}
.logo span{font-size:11px;color:var(--muted2);font-weight:400;margin-left:5px}
.hdr-right{display:flex;align-items:center;gap:8px}
.date-chip{font-size:11px;color:var(--muted2);background:var(--card);padding:3px 10px;border-radius:20px}
.btn-admin{background:var(--card);border:1px solid #333;color:var(--muted2);width:30px;height:30px;border-radius:50%;font-size:15px;cursor:pointer;display:flex;align-items:center;justify-content:center;flex-shrink:0}
.btn-admin.unlocked{border-color:var(--gold-d);color:var(--gold)}
.conn-dot{width:8px;height:8px;border-radius:50%;background:var(--muted);flex-shrink:0;transition:background .3s}
.conn-dot.online{background:var(--green)}
.conn-dot.offline{background:var(--red)}
.loading-screen{position:fixed;inset:0;background:var(--bg);z-index:2000;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:16px}
.loading-screen .spin{font-size:40px;animation:spin 1s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}
.pcards{display:grid;grid-template-columns:repeat(3,1fr);gap:7px}
.pc{background:var(--card);border:2px solid transparent;border-radius:10px;padding:8px 5px;text-align:center;cursor:pointer;transition:border-color .15s,background .15s;position:relative}
.pc.active{border-color:var(--gold);background:#1C1800}
.pc-emoji{font-size:20px;display:block;margin-bottom:3px}
.pc-name{font-size:12px;font-weight:700;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.pc-fc{font-size:11px;color:var(--gold);font-weight:700;margin-top:1px}
.pc-lvl{position:absolute;top:-7px;right:-7px;font-size:9px;font-weight:800;background:var(--gold);color:#000;padding:2px 6px;border-radius:10px;line-height:1.3}
.tqb{background:var(--surface);padding:10px 16px;border-bottom:1px solid #1A1A1A}
.tqb-row{display:flex;justify-content:space-between;align-items:center;margin-bottom:5px}
.tqb-lbl{font-size:11px;color:var(--muted2);text-transform:uppercase;letter-spacing:.5px}
.tqb-val{font-size:14px;font-weight:800}
.tqb-val.g{color:var(--green)}.tqb-val.a{color:var(--amber)}.tqb-val.r{color:var(--red)}
.pbar{height:7px;background:#222;border-radius:4px;overflow:hidden}
.pfill{height:100%;border-radius:4px;transition:width .5s ease}
.pfill.g{background:linear-gradient(90deg,#2E7D32,var(--green))}
.pfill.a{background:linear-gradient(90deg,#B45309,var(--amber))}
.pfill.r{background:linear-gradient(90deg,#7F1D1D,var(--red))}
.rec-alert{margin-top:8px;background:#1A0800;border:1px solid #7F3D00;border-radius:var(--rs);padding:8px 12px;font-size:12px;color:var(--amber);display:flex;align-items:center;gap:6px}
.bnav{position:fixed;bottom:0;left:0;right:0;height:var(--nav);background:var(--surface);border-top:1px solid #1A1A1A;display:flex;z-index:200}
.ni{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:2px;cursor:pointer;color:var(--muted);font-size:9px;font-weight:700;text-transform:uppercase;letter-spacing:.3px;border-top:2px solid transparent;transition:color .15s;padding-top:2px}
.ni .ico{font-size:19px}
.ni.active{color:var(--gold);border-top-color:var(--gold)}
.content{padding:14px 14px 90px}
.shdr{display:flex;align-items:center;gap:8px;margin-bottom:12px;margin-top:2px}
.sdot{width:7px;height:7px;border-radius:50%;background:var(--gold);flex-shrink:0}
.shdr h3{font-size:12px;font-weight:800;text-transform:uppercase;letter-spacing:.7px;color:var(--muted2)}
.shdr .sbadge{margin-left:auto;font-size:11px;color:var(--gold);background:#1C1800;padding:3px 10px;border-radius:10px;font-weight:700}
.card{background:var(--card);border:1px solid #242424;border-radius:var(--r);padding:14px;margin-bottom:10px}
.grid2{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:10px}
.grid3{display:grid;grid-template-columns:repeat(3,1fr);gap:6px;margin-bottom:10px}
.grid4{display:grid;grid-template-columns:repeat(4,1fr);gap:6px;margin-bottom:10px}
.mstat{background:var(--card);border:1px solid #242424;border-radius:var(--rs);padding:10px 6px;text-align:center}
.mstat-v{font-size:20px;font-weight:800;line-height:1}
.mstat-l{font-size:10px;color:var(--muted2);margin-top:3px}
.cv-gold{color:var(--gold)}.cv-green{color:var(--green)}.cv-amber{color:var(--amber)}.cv-red{color:var(--red)}.cv-white{color:var(--text)}.cv-muted{color:var(--muted2)}
.pmcard{background:var(--card);border:1px solid #242424;border-radius:var(--rs);padding:12px 14px;margin-bottom:8px}
.pmcard-hdr{display:flex;justify-content:space-between;align-items:center;margin-bottom:6px}
.pmcard-name{font-size:13px;font-weight:700}
.pmcard-pct{font-size:13px;font-weight:800}
.pmcard-pct.r{color:var(--red)}.pmcard-pct.a{color:var(--amber)}.pmcard-pct.g{color:var(--green)}
.pmcard-nums{display:flex;justify-content:space-between;font-size:11px;color:var(--muted2);margin-top:5px}
.rcard{background:var(--card);border:1px solid #242424;border-radius:var(--r);padding:12px 14px;margin-bottom:8px;display:flex;align-items:center;gap:12px}
.rcard.r1{border-color:var(--gold);background:#1A1600}
.rcard.r2{border-color:#9CA3AF;background:#161616}
.rcard.r3{border-color:#B45309;background:#160E05}
.rmedal{font-size:24px;flex-shrink:0}
.ravatar{width:40px;height:40px;border-radius:50%;background:var(--card2);display:flex;align-items:center;justify-content:center;font-size:18px;border:2px solid #333;flex-shrink:0}
.rcard.r1 .ravatar{border-color:var(--gold)}
.rinfo{flex:1;min-width:0}
.rname{font-size:14px;font-weight:700}
.rsub{font-size:11px;color:var(--muted2);margin-top:2px}
.rfc{font-size:19px;font-weight:800;color:var(--gold);text-align:right;flex-shrink:0}
.rfc small{display:block;font-size:10px;color:var(--muted2);font-weight:400}
.lvbadge{display:inline-flex;align-items:center;gap:4px;padding:3px 9px;border-radius:20px;font-size:10px;font-weight:800}
.lv1{background:#1A1A1A;color:#888;border:1px solid #333}
.lv2{background:#1A2A1A;color:#4CAF50;border:1px solid #2A4A2A}
.lv3{background:#1A1A2A;color:#818CF8;border:1px solid #2A2A4A}
.lv4{background:#1C1800;color:var(--gold);border:1px solid var(--gold-d)}
.lv5{background:#1A0800;color:#FB923C;border:1px solid #7F3D00}
.lvl-row{display:flex;align-items:center;gap:10px;padding:10px 14px;background:var(--card);border-radius:var(--rs);margin-bottom:10px;border:1px solid #242424}
.lvl-info{flex:1}
.lvl-nr{display:flex;justify-content:space-between;align-items:center;margin-bottom:5px}
.lvl-name{font-size:13px;font-weight:700}
.lvl-xp{font-size:11px;color:var(--muted2)}
/* activity section (no FC) */
.act-section{background:var(--card2);border:1px solid #1E1E1E;border-radius:var(--rs);padding:12px 14px;margin-bottom:10px}
.act-title{font-size:11px;font-weight:700;color:var(--muted2);text-transform:uppercase;letter-spacing:.5px;margin-bottom:10px;display:flex;align-items:center;gap:6px}
.act-row{display:flex;justify-content:space-between;align-items:center;padding:6px 0;border-bottom:1px solid #2A2A2A;font-size:13px}
.act-row:last-child{border-bottom:none}
.act-val{font-weight:700;color:var(--muted2)}
/* store */
.tier-badge{display:inline-flex;align-items:center;gap:6px;font-size:11px;font-weight:800;text-transform:uppercase;letter-spacing:.8px;padding:5px 12px;border-radius:6px;margin-bottom:10px}
.tb-bronze{background:#2A1800;color:#CD7F32}
.tb-prata{background:#1A1A22;color:#C0C0C0}
.tb-ouro{background:#1C1800;color:var(--gold)}
.tb-elite{background:#1A0800;color:#FB923C}
.sitem{background:var(--card);border:1px solid #242424;border-radius:var(--rs);padding:12px;margin-bottom:8px;display:flex;align-items:flex-start;gap:10px}
.sitem.can{border-color:#2A4A2A}
.sitem.cant{opacity:.45}
.sitem.pend{border-color:var(--amber);background:#1A1200}
.si-ico{font-size:26px;flex-shrink:0;margin-top:2px}
.si-info{flex:1;min-width:0}
.si-name{font-size:13px;font-weight:700}
.si-partner{font-size:10px;color:var(--muted2);margin-top:1px}
.si-desc{font-size:12px;color:var(--muted2);margin-top:4px;line-height:1.4}
.si-right{text-align:right;flex-shrink:0}
.si-cost{font-size:14px;font-weight:800;color:var(--gold)}
.si-cost-l{font-size:10px;color:var(--muted2)}
.btn-resgate{margin-top:8px;background:var(--gold);color:#000;border:none;padding:6px 14px;border-radius:20px;font-size:12px;font-weight:700;cursor:pointer;display:block;width:100%;text-align:center}
.btn-resgate:disabled{background:#2A2A2A;color:var(--muted);cursor:not-allowed}
.btn-resgate.pend{background:var(--amber);color:#000}
.fc-bal{background:#1C1800;border:1px solid var(--gold-d);border-radius:var(--rs);padding:10px 14px;display:flex;align-items:center;justify-content:space-between;margin-bottom:14px}
.fcb-l{font-size:12px;color:var(--gold-d)}
.fcb-v{font-size:22px;font-weight:800;color:var(--gold)}
.fcb-v small{font-size:13px;font-weight:600}
/* report form */
.fgroup{margin-bottom:13px}
.flabel{font-size:11px;font-weight:700;color:var(--muted2);text-transform:uppercase;letter-spacing:.5px;margin-bottom:6px;display:flex;justify-content:space-between;align-items:center}
.flabel .hint{font-size:11px;color:var(--gold-d);font-weight:600;text-transform:none;letter-spacing:0}
.flabel .no-fc{font-size:10px;color:var(--muted);font-weight:400;text-transform:none;letter-spacing:0;background:#222;padding:2px 6px;border-radius:8px}
.finput{width:100%;background:var(--card2);border:1px solid #333;color:var(--text);padding:12px 14px;border-radius:var(--rs);font-size:16px}
.finput:focus{outline:none;border-color:var(--gold-d)}
.finput.money{font-size:18px;font-weight:700;color:var(--green)}
.finput.total-display{background:#1A2A1A;border-color:#2A4A2A;color:var(--green);font-size:18px;font-weight:800;text-align:center}
.frow{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:13px}
.frow3{display:grid;grid-template-columns:repeat(3,1fr);gap:8px;margin-bottom:13px}
.btn-submit{width:100%;padding:16px;background:var(--gold);color:#000;border:none;border-radius:var(--r);font-size:16px;font-weight:800;cursor:pointer;margin-top:6px}
.btn-submit:active{background:var(--gold-l);transform:scale(.98)}
.already-badge{background:#052E16;border:1px solid #166534;border-radius:var(--r);padding:12px 16px;text-align:center;margin-bottom:14px;font-size:13px;color:var(--green)}
.already-badge strong{display:block;font-size:16px;margin-bottom:4px}
.fc-sum{background:#052E16;border:1px solid #166534;border-radius:var(--r);padding:14px;margin-top:12px}
.fc-sum h3{font-size:15px;font-weight:800;color:var(--green);margin-bottom:10px}
.fci{display:flex;justify-content:space-between;align-items:center;padding:6px 0;border-bottom:1px solid #166534;font-size:13px}
.fci:last-of-type{border-bottom:none}
.fci-pts{font-size:14px;font-weight:800;color:var(--gold)}
.fc-total{display:flex;justify-content:space-between;align-items:center;margin-top:10px;padding-top:10px;border-top:2px solid #166534}
.fc-total-l{font-size:14px;font-weight:700}
.fc-total-v{font-size:26px;font-weight:800;color:var(--gold)}
.comm-card{background:#1A1A0A;border:1px solid #2A2A1A;border-radius:var(--rs);padding:12px 14px;margin-bottom:8px}
.comm-title{font-size:11px;color:var(--gold-d);font-weight:700;text-transform:uppercase;letter-spacing:.5px;margin-bottom:4px}
.comm-value{font-size:20px;font-weight:800;color:var(--gold)}
.comm-sub{font-size:11px;color:var(--muted2);margin-top:2px}
.streak-pill{display:inline-flex;align-items:center;gap:4px;background:#1A0800;border:1px solid #7F3D00;border-radius:20px;padding:3px 10px;font-size:12px;font-weight:700;color:#FB923C}
.toast{position:fixed;bottom:calc(var(--nav)+14px);left:50%;transform:translateX(-50%) translateY(20px);background:var(--gold);color:#000;padding:10px 20px;border-radius:30px;font-size:13px;font-weight:700;opacity:0;transition:all .3s;z-index:999;pointer-events:none;max-width:92vw;text-align:center}
.toast.show{opacity:1;transform:translateX(-50%) translateY(0)}
.lvup-ov{display:none;position:fixed;inset:0;background:rgba(0,0,0,.93);z-index:1000;align-items:center;justify-content:center;flex-direction:column;text-align:center;padding:30px}
.lvup-ov.show{display:flex}
.lvup-ico{font-size:80px;animation:pop .5s ease}
.lvup-title{font-size:26px;font-weight:800;color:var(--gold);margin-top:14px}
.lvup-sub{font-size:15px;color:var(--text);margin-top:8px;line-height:1.5}
.lvup-close{margin-top:24px;background:var(--gold);color:#000;border:none;padding:14px 36px;border-radius:30px;font-size:16px;font-weight:800;cursor:pointer}
@keyframes pop{0%{transform:scale(.5)}60%{transform:scale(1.2)}100%{transform:scale(1)}}
.drank{display:flex;align-items:center;gap:10px;padding:10px 12px;background:var(--card2);border-radius:var(--rs);margin-bottom:7px;border:1px solid #242424}
.drank-pos{font-size:18px;width:28px;flex-shrink:0}
.drank-name{font-size:14px;font-weight:700;flex:1}
.drank-rev{font-size:13px;font-weight:700;color:var(--green)}
.drank-fc{font-size:12px;color:var(--gold);font-weight:700}
.res-item{background:var(--card);border-radius:var(--rs);padding:10px 14px;margin-bottom:6px;display:flex;justify-content:space-between;align-items:center;border:1px solid #1E1E1E;gap:10px}
.res-name{font-size:13px;font-weight:600;flex:1}
.res-date{font-size:10px;color:var(--muted2)}
.badge-pend{color:var(--amber);font-size:11px;font-weight:700}
.badge-ok{color:var(--green);font-size:11px;font-weight:700}
.arch-card{background:var(--card);border:1px solid #242424;border-radius:var(--rs);padding:12px 14px;margin-bottom:8px}
.arch-month{font-size:13px;font-weight:800;color:var(--gold);margin-bottom:6px}
.empty{text-align:center;padding:36px 20px;color:var(--muted2)}
.empty .big{font-size:38px;margin-bottom:10px}
/* ADMIN */
.admin-ov{display:none;position:fixed;inset:0;background:var(--bg);z-index:950;overflow-y:auto;padding-bottom:80px}
.admin-ov.show{display:block}
.admin-header{background:var(--surface);border-bottom:1px solid #1E1E1E;padding:14px 16px;display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;z-index:10}
.admin-title{font-size:16px;font-weight:800;color:var(--gold)}
.btn-close-admin{background:var(--card);border:1px solid #333;color:var(--muted2);width:32px;height:32px;border-radius:50%;font-size:18px;cursor:pointer;display:flex;align-items:center;justify-content:center}
.admin-tabs{display:flex;background:var(--surface);border-bottom:1px solid #1E1E1E;overflow-x:auto;-webkit-overflow-scrolling:touch}
.admin-tabs::-webkit-scrollbar{display:none}
.atab{flex-shrink:0;padding:10px 14px;font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:.5px;color:var(--muted2);cursor:pointer;border-bottom:2px solid transparent;white-space:nowrap}
.atab.active{color:var(--gold);border-bottom-color:var(--gold)}
.admin-content{padding:14px;padding-bottom:120px}
.af-group{margin-bottom:14px}
.af-label{font-size:11px;font-weight:700;color:var(--muted2);text-transform:uppercase;letter-spacing:.5px;margin-bottom:6px;display:block}
.af-input{width:100%;background:var(--card2);border:1px solid #333;color:var(--text);padding:10px 12px;border-radius:var(--rs);font-size:15px}
.af-input:focus{outline:none;border-color:var(--gold-d)}
.af-row{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:14px}
.btn-save{background:var(--gold);color:#000;border:none;padding:12px 20px;border-radius:var(--rs);font-size:14px;font-weight:700;cursor:pointer;width:100%;margin-top:4px}
.btn-danger{background:#2A0A0A;color:var(--red);border:1px solid #3A1212;padding:8px 14px;border-radius:var(--rs);font-size:13px;cursor:pointer}
.btn-sm-gold{background:var(--gold-d);color:var(--gold-l);border:none;padding:5px 12px;border-radius:20px;font-size:11px;font-weight:700;cursor:pointer}
.btn-sm-red{background:#2A0A0A;color:var(--red);border:1px solid #3A1212;padding:5px 12px;border-radius:20px;font-size:11px;cursor:pointer}
.fc-rule-row{display:flex;align-items:center;gap:10px;padding:10px 0;border-bottom:1px solid #242424}
.fc-rule-row:last-child{border-bottom:none}
.fc-rule-label{flex:1;font-size:13px}
.fc-rule-sub{font-size:11px;color:var(--muted2);margin-top:2px}
.fc-rule-input{width:68px;background:var(--card2);border:1px solid #333;color:var(--gold);padding:8px 10px;border-radius:var(--rs);font-size:15px;font-weight:700;text-align:center}
.fc-rule-unit{font-size:11px;color:var(--muted2);white-space:nowrap}
.store-edit-item{background:var(--card2);border:1px solid #2A2A2A;border-radius:var(--rs);padding:12px;margin-bottom:8px}
.sei-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:8px}
.sei-name{font-size:13px;font-weight:700}
.sei-actions{display:flex;gap:6px}
.pw-modal{display:none;position:fixed;inset:0;background:rgba(0,0,0,.85);z-index:950;align-items:center;justify-content:center;padding:20px}
.pw-modal.show{display:flex}
.pw-box{background:var(--surface);border:1px solid #333;border-radius:var(--r);padding:24px;width:100%;max-width:340px;text-align:center}
.pw-box h3{font-size:18px;font-weight:800;color:var(--gold);margin-bottom:8px}
.pw-box p{font-size:13px;color:var(--muted2);margin-bottom:16px}
.pw-input{width:100%;background:var(--card2);border:1px solid #333;color:var(--text);padding:12px 14px;border-radius:var(--rs);font-size:18px;text-align:center;letter-spacing:4px;margin-bottom:12px}
.pw-input:focus{outline:none;border-color:var(--gold-d)}
.pw-btns{display:flex;gap:8px}
.pw-submit{flex:1;background:var(--gold);color:#000;border:none;padding:12px;border-radius:var(--rs);font-size:15px;font-weight:800;cursor:pointer}
.pw-cancel{padding:12px 18px;background:var(--card2);color:var(--muted2);border:1px solid #333;border-radius:var(--rs);font-size:15px;cursor:pointer}
.pw-error{color:var(--red);font-size:12px;margin-top:-6px;margin-bottom:8px;display:none}
.pw-error.show{display:block}
.bonus-notif{background:#052E16;border:1px solid #166534;border-radius:var(--r);padding:14px;margin-bottom:12px}
.bonus-notif h3{font-size:14px;font-weight:800;color:var(--green);margin-bottom:8px}
.bonus-notif-item{display:flex;justify-content:space-between;font-size:13px;padding:4px 0;border-bottom:1px solid #166534}
.bonus-notif-item:last-child{border-bottom:none}
.bonus-notif-pts{color:var(--gold);font-weight:700}
@media(max-width:360px){.pc-name{font-size:10px}.pc-emoji{font-size:17px}.mstat-v{font-size:17px}}

/* WELCOME SCREEN */

}
function clearSession(){
  try{ localStorage.removeItem('p43_session'); }catch(e){}
}
function loadSession(){
  try{
    const d = JSON.parse(localStorage.getItem('p43_session')||'null');
    if(!d) return null;
    if(d.date !== today()) return null;                  // expirou (novo dia)
    const currentPin = getPlayerPin(d.player);
    if(currentPin){
      if(!d.pinOk)               return null;           // nunca verificou PIN
      if(d.pinVal !== currentPin) return null;           // PIN mudou após a sessão

// Sessão com PIN verificado hoje E com o PIN correto?
function sessionPinOk(playerIdx){
  try{
    const d = JSON.parse(localStorage.getItem('p43_session')||'null');
    if(!d) return false;
    if(d.date !== today()) return false;
    if(d.player !== playerIdx) return false;
    if(!d.pinOk) return false;
    // Se o PIN mudou desde que a sessão foi criada → inválida
    const currentPin = getPlayerPin(playerIdx);
    if(currentPin && d.pinVal !== currentPin) return false;
    return true;
  }catch(e){ return false; }
}

function mergeFirebaseData(data){
  const cp = S.currentPlayer;
  const ct = S.currentTab;
  S = { ...S, ...data };
  S.currentPlayer = cp;
  S.currentTab    = ct;

  // Firebase pode retornar players como objeto {0:{...},1:{...}} em vez de array
  if(S.players && !Array.isArray(S.players)){
    S.players = Object.keys(S.players)
      .sort((a,b)=>Number(a)-Number(b))
      .map(k => S.players[k]);
  }

  // garantir estrutura dos players preservando PIN e outros campos extras
  DEFAULT_PLAYERS.forEach((dp,i)=>{
    if(!S.players[i]) S.players[i] = {...dp};
    else {
      const existing = S.players[i];
      S.players[i] = { ...dp, ...existing }; // existing sobrescreve defaults (inclui pin)
    }
  });

  // garantir arrays/objetos
  if(!Array.isArray(S.resgates)) S.resgates    = [];
  if(!S.reports)                  S.reports     = {};
  if(!S.monthConfig)              S.monthConfig = {};
  if(!S.fcRules)                  S.fcRules     = {};
  if(!S.monthArchive)             S.monthArchive  = {};
  if(S.monthChampion === undefined) S.monthChampion = null;
  if(!S.pins)                     S.pins        = { 0:'', 1:'', 2:'' };
  if(!S.missions)                 S.missions    = {};
  if(!S.gameRules)                S.gameRules   = {};
  if(!S.customTriggers)          S.customTriggers = [];
  if(!S.cfoPin)                  S.cfoPin = '';
}

// ═══════════════════════════════════════════
// FC CALCULATION — verified metrics only
// ═══════════════════════════════════════════
function calcFC(pid, r){
  const items=[];
  const add=(label,pts)=>{ if(pts>0) items.push({label,pts}); };

  add('📝 Report preenchido', fc('report'));

  // Per-unit verified metrics
  const ma=r.qtdMatriculas||0, re=r.qtdRenovacoes||0, ru=r.qtdRenovacoesUpgrade||0;
  const p72=r.qtdPlano72||0, ae=r.aulaExp||0;
  const ca=r.qtdCampanhas||0, po=r.qtdPostagens||0;
  if(ma>0) add(`🎓 ${ma} nova${ma>1?'s':''} matrícula${ma>1?'s':''}`, ma*fc('matricula'));
  if(re>0) add(`🔄 ${re} renovação${re>1?'ões':''}`, re*fc('renovacao'));
  if(ru>0) add(`⬆️ ${ru} renovação${ru>1?'ões':''} com upgrade`, ru*fc('renovacaoUpgrade'));
  if(p72>0) add(`🟡 ${p72} plano${p72>1?'s':''} 72 créditos`, p72*fc('plano72'));
  if(ae>0) add(`🎾 ${ae} aula${ae>1?'s':''} experimental`, ae*fc('aulaExp'));
  if(ca>0) add(`📣 ${ca} campanha${ca>1?'s':''} realizada${ca>1?'s':''}`, ca*fc('campanha'));
  if(po>0) add(`📸 ${po} postagem${po>1?'ns':''}`, po*fc('postagem'));

  // Bônus completude missão — todas as 3 tarefas marcadas
  const checks = r.taskChecks || [];
  if(checks[0] && checks[1] && checks[2])
    add('⭐ Bônus completude missão', fc('completudeAtiv'));

  // Gatilho R$2k individual
  const indTotal = repTotal(r);
  if(indTotal >= gr('threshold2k')) add(`🚀 Gatilho R$${gr('threshold2k').toLocaleString('pt-BR')} individual`, fc('gatilho2k'));

  // Gatilho 4 planos: matrículas + upgrades + plano72(×2)
  if(ma + ru + (p72*2) >= gr('minPlanos')) add(`⚡ Gatilho ${gr('minPlanos')} planos no dia`, fc('gatilho4'));

  // Streak 5
  if((S.players[pid].streak||0)>=gr('streakDays')) add(`🔥 Sequência de ${gr('streakDays')} dias`, fc('streak5'));

  // Cota diária do time (preview with this report)
  // Exclui o report anterior da própria jogadora para evitar dupla contagem ao editar
  const activeD = getActiveDate ? getActiveDate() : today();
  const existingRep = getReport(pid, activeD);
  const existingRev = existingRep
    ? repTotal(existingRep)
    : 0;
  const otherTeamRev = teamRevForDate(activeD) - existingRev;
  const previewRev = otherTeamRev+repTotal(r);
  const quotaForDay = activeD === today() ? effectiveQuota() : getCfg(activeD.slice(0,7)).dailyQuota;
  if(previewRev >= quotaForDay) add('🏆 Cota diária do time', fc('cotaDiaria'));

  // Gatilhos personalizados
  (S.customTriggers||[]).filter(t=>t.enabled).forEach(t=>{
    if(t.type==='valor'){
      if(indTotal >= (t.threshold||0)) add(t.label||'Gatilho', t.fc||0);
    } else if(t.type==='quantidade'){
      const qval = r[t.field]||0;
      if(qval >= (t.threshold||0)) add(t.label||'Gatilho', t.fc||0);
    } else if(t.type==='sequencia'){
      if((S.players[pid].streak||0) >= (t.days||2)) add(t.label||'Sequência', t.fc||0);
    }
  });

  const total=items.reduce((s,i)=>s+i.pts,0);
  return{items,total};
}

function calcDailyComm(pid){
  const r=todayReport(pid); if(!r) return 0;
  if(!teamHitForDate(today())) return 0;
  return repTotal(r)*0.02;
}
function calcMonthComm(pid){
  const total = monthRev(pid);
  const teamTotal = totalTeamMonthRev();
  const cfg = curCfg();
  const rate = teamTotal >= cfg.monthQuota ? 0.025 : 0.015;
  return total * rate;
}
function monthCommRate(){
  const teamTotal = totalTeamMonthRev();
  const cfg = curCfg();
  return teamTotal >= cfg.monthQuota ? 0.025 : 0.015;
}

}

// MANUAL MONTH CLOSE (admin-triggered)
// ═══════════════════════════════════════════
function manualMonthClose(){
  const mk = monthKey();
  if(!confirm(`Fechar ${monthLabel(mk)} e resetar FitCoins?\n\nIsso vai:\n• Arquivar resultados e ranking do mês\n• Distribuir bônus de metas atingidas\n• Zerar FitCoins e streak de todas as jogadoras\n\nResgates pendentes continuam válidos.\n\n⚠️ Esta ação não pode ser desfeita.`)) return;

  const cfg = getCfg(mk);
  const fcLog = [];
  const teamTotal = S.players.reduce((s,p) => s + monthRevForKey(p.id, mk), 0);

  // Distribui bônus mensais
  S.players.forEach(p => {
    const pRev = monthRevForKey(p.id, mk);
    const items = [];
    if(pRev >= getPlayerIndQuota(p.id)){
      p.fitcoins = (p.fitcoins||0) + fc('cotaIndMes');
      items.push({ label:`🎯 Cota individual`, pts: fc('cotaIndMes') });
    }
    if(teamTotal >= cfg.monthQuota){
      p.fitcoins = (p.fitcoins||0) + fc('cotaTimeMes');
      items.push({ label:`🏆 Cota time`, pts: fc('cotaTimeMes') });
    }
    if(teamTotal >= cfg.superacao){
      p.fitcoins = (p.fitcoins||0) + fc('superacao');
      items.push({ label:`🚀 Superação`, pts: fc('superacao') });
    }
    if(items.length) fcLog.push({ pid: p.id, name: p.name, items, total: items.reduce((s,i) => s+i.pts, 0) });
  });

  // Arquiva com ranking final de FC (após bônus, antes do reset)
  S.monthArchive[mk] = {
    revenue:       teamTotal,
    fcLog,
    playerRanking: S.players.map(p => ({ name: p.name, emoji: p.emoji, fitcoins: p.fitcoins || 0 })),
    closedAt:      new Date().toISOString(),
    closedBy:      'admin',
  };

  // Elege a campeã do mês (quem tinha mais FC antes do reset)
  const champion = S.players.reduce((best, p) => (p.fitcoins||0) > (best.fitcoins||0) ? p : best, S.players[0]);
  S.monthChampion = { pid: champion.id, name: champion.name, emoji: champion.emoji, month: mk };
  fcLog.push({ pid: champion.id, name: champion.name, items: [{ label:`👑 Campeã do mês ${monthLabel(mk)}`, pts: 150 }], total: 150, isChampion: true });

  if(fcLog.length) S.pendingBonus = { month: mk, fcLog };
  S.lastAutoClose = mk;

  // RESET mensal: zera FC, streak e lastReportDate
  S.players.forEach(p => { p.fitcoins = 0; p.streak = 0; p.lastReportDate = null; });

  // Campeã começa o novo mês com +150 FC
  const champIdx = S.players.findIndex(p => p.id === champion.id);
  if(champIdx >= 0) S.players[champIdx].fitcoins = 150;

  save();
  showToast(`${monthLabel(mk)} fechado e FitCoins resetados! ✅`);
  renderAll();
  renderAdminContent();
}

function manualMonthCloseFor(mk){
  if(S.monthArchive[mk]) { showToast('⚠️ Mês já fechado!'); return; }
  if(!confirm(`Fechar ${monthLabel(mk)} retroativamente?\n\nIsso vai arquivar resultados, distribuir bônus e eleger a campeã daquele mês.\n\n⚠️ Esta ação não pode ser desfeita.`)) return;

  const cfg = getCfg(mk);
  const fcLog = [];
  const teamTotal = S.players.reduce((s,p) => s + monthRevForKey(p.id, mk), 0);

  // Snapshot dos FC atuais antes de qualquer modificação
  const fcSnapshot = {};
  S.players.forEach(p => { fcSnapshot[p.id] = p.fitcoins||0; });

  // Distribui bônus mensais
  S.players.forEach(p => {
    const pRev = monthRevForKey(p.id, mk);
    const items = [];
    if(pRev >= getPlayerIndQuota(p.id)){
      p.fitcoins = (p.fitcoins||0) + fc('cotaIndMes');
      items.push({ label:`🎯 Cota individual`, pts: fc('cotaIndMes') });
    }
    if(teamTotal >= cfg.monthQuota){
      p.fitcoins = (p.fitcoins||0) + fc('cotaTimeMes');
      items.push({ label:`🏆 Cota time`, pts: fc('cotaTimeMes') });
    }
    if(teamTotal >= cfg.superacao){
      p.fitcoins = (p.fitcoins||0) + fc('superacao');
      items.push({ label:`🚀 Superação`, pts: fc('superacao') });
    }
    if(items.length) fcLog.push({ pid: p.id, name: p.name, items, total: items.reduce((s,i) => s+i.pts, 0) });
  });

  // Arquiva com ranking baseado no FC snapshot (antes dos bônus)
  S.monthArchive[mk] = {
    revenue:       teamTotal,
    fcLog,
    playerRanking: S.players.map(p => ({ name: p.name, emoji: p.emoji, fitcoins: fcSnapshot[p.id] })),
    closedAt:      new Date().toISOString(),
    closedBy:      'admin-retroativo',
  };

  // Elege campeã pelo snapshot de FC
  const champion = S.players.reduce((best, p) => (fcSnapshot[p.id]||0) > (fcSnapshot[best.id]||0) ? p : best, S.players[0]);
  S.monthChampion = { pid: champion.id, name: champion.name, emoji: champion.emoji, month: mk };
  fcLog.push({ pid: champion.id, name: champion.name, items: [{ label:`👑 Campeã do mês ${monthLabel(mk)}`, pts: 150 }], total: 150, isChampion: true });

  if(fcLog.length) S.pendingBonus = { month: mk, fcLog };
  S.lastAutoClose = mk;

  // Zera FC, streak e reports do mês anterior — mantém o que já foi feito em julho
  const julyReports = {};
  Object.keys(S.reports).forEach(k => {
    if(k.includes('_2026-07')) julyReports[k] = S.reports[k];
  });
  S.reports = julyReports;
  S.players.forEach(p => { p.fitcoins = 0; p.streak = 0; p.lastReportDate = null; });

  // Campeã começa julho com +150 FC
  const champIdx = S.players.findIndex(p => p.id === champion.id);
  if(champIdx >= 0) S.players[champIdx].fitcoins = 150;

  save();
  showToast(`${monthLabel(mk)} fechado retroativamente! ✅`);
  renderAll();
  renderAdminContent();
}

function submitReport(e){
  e.preventDefault();
  const pid=S.currentPlayer, p=S.players[pid];
  const r={
    qtdMatriculas:        parseInt(document.getElementById('f_qtdma').value)||0,
    qtdRenovacoes:        parseInt(document.getElementById('f_qtdr').value)||0,
    qtdRenovacoesUpgrade: parseInt(document.getElementById('f_qtdru').value)||0,
    qtdPlano72:           parseInt(document.getElementById('f_qtdp72').value)||0,
    aulaExp:          parseInt(document.getElementById('f_aula').value)||0,
    qtdCampanhas:     parseInt(document.getElementById('f_camp').value)||0,
    qtdPostagens:     parseInt(document.getElementById('f_post').value)||0,
    taskChecks:       [0,1,2].map(i=>document.getElementById(`f_task${i}`)?.checked||false),
    abordagens:       parseInt(document.getElementById('f_abord').value)||0,
    leadsQuentes:     parseInt(document.getElementById('f_leads').value)||0,
    indicacoes:       parseInt(document.getElementById('f_indic').value)||0,
    valorTotal: parseFloat(document.getElementById('f_vtotal').value)||0,
    obs:              document.getElementById('f_obs').value||'',
    submittedAt:      new Date().toLocaleTimeString('pt-BR',{hour:'2-digit',minute:'2-digit'}),
    date:             getActiveDate(),
  };
  const prevLv=getLevel(p.fitcoins||0);
  const result=calcFC(pid,r);
  r.fcEarned=result.total; r.fcBreakdown=result.items;

  // Devolve FC do report anterior se estiver editando
  const prevReport = getReport(pid, getActiveDate());
  if(prevReport && prevReport.fcEarned){
    p.fitcoins = Math.max(0, (p.fitcoins||0) - prevReport.fcEarned);
  }

  S.reports[`${pid}_${getActiveDate()}`]=r;
  p.fitcoins=(p.fitcoins||0)+result.total;
  if(getActiveDate() === today()) updateStreak(pid);
  save();
  const newLv=getLevel(p.fitcoins);
  if(newLv.n>prevLv.n){
    document.getElementById('lvupIco').textContent=newLv.ico;
    document.getElementById('lvupSub').innerHTML=`Você chegou ao nível <strong>${newLv.n}</strong><br><span style="font-size:20px">${newLv.ico} ${newLv.name}</span>`;
    document.getElementById('lvupOv').classList.add('show');
  } else {
    showToast(`+${result.total} FitCoins ganhos! 🪙`);
  }
  renderAll();
  setTimeout(()=>{ const el=document.getElementById('fcSummary'); if(el) el.scrollIntoView({behavior:'smooth',block:'center'}); },200);
}

function resgate(itemId){
  const pid=S.currentPlayer, p=S.players[pid];
  const item=getStore().find(i=>i.id===itemId);
  if(!item) return;
  if((p.fitcoins||0)<item.cost){ showToast('FitCoins insuficientes 😅',true); return; }
  if(!confirm(`Resgatar "${item.name}" por ${item.cost} FC?\nUm gestor precisará aprovar.`)) return;
  p.fitcoins=(p.fitcoins||0)-item.cost;
  S.resgates.push({pid,itemId,itemName:item.name,cost:item.cost,date:today(),status:'pending'});
  save(); renderAll(); showToast('Resgate solicitado! ✅');
}

function requestBonusCota(){
  const pid=S.currentPlayer, p=S.players[pid];
  const pIndQuota=getPlayerIndQuota(pid);
  if(monthRev(pid)<pIndQuota){ showToast('Você ainda não bateu a cota individual 😅',true); return; }
  if(S.resgates.some(r=>r.pid===pid&&r.type==='bonus_cota'&&r.date.startsWith(monthKey()))){
    showToast('Bônus já solicitado este mês ⏳',true); return;
  }
  if(!confirm('Solicitar Bônus de Cota R$500,00?\nO pagamento será feito via Pix após aprovação do gestor.')) return;
  S.resgates.push({pid,type:'bonus_cota',itemId:'__bonus_cota__',itemName:'💰 Bônus de Cota Individual',cost:0,valorReais:500,date:today(),status:'pending'});
  save(); renderAll(); showToast('Bônus solicitado! 💰');
}
function resgateSaque(){
  const pid=S.currentPlayer, p=S.players[pid];
  const fc_=p.fitcoins||0;
  const rate=fc('saqueRate')/100; // R$ por FC
  const minFC=100;
  if(fc_<minFC){ showToast(`Mínimo de ${minFC} FC para saque 😅`,true); return; }
  // Só 1 saque pendente por vez
  if(S.resgates.some(r=>r.pid===pid&&r.type==='saque'&&r.status==='pending')){
    showToast('Você já tem um saque pendente ⏳',true); return;
  }
  const maxMultiple=Math.floor(fc_/minFC)*minFC;
  const qtd=parseInt(prompt(`Quantos FitCoins deseja sacar?\nMínimo: ${minFC} FC | Disponível: ${fc_} FC\nValor em R$: R$${(maxMultiple*rate).toFixed(2)} máximo\n\n(Digite múltiplos de ${minFC})`));
  if(!qtd||isNaN(qtd)) return;
  const fcQtd=Math.floor(qtd/minFC)*minFC;
  if(fcQtd<minFC){ showToast(`Mínimo ${minFC} FC`,true); return; }
  if(fcQtd>fc_){ showToast('FitCoins insuficientes 😅',true); return; }
  const valor=(fcQtd*rate).toFixed(2);
  if(!confirm(`Solicitar saque de ${fcQtd} FC = R$${valor}?\nO pagamento será feito via Pix após aprovação.`)) return;
  p.fitcoins=fc_-fcQtd;
  S.resgates.push({pid,type:'saque',itemId:'__saque__',itemName:`💵 Saque em Dinheiro`,cost:fcQtd,valorReais:parseFloat(valor),date:today(),status:'pending'});
  save(); renderAll(); showToast('Saque solicitado! 💵');
}

      <span style="font-size:28px">👑</span>
      <div>
        <div style="font-size:13px;font-weight:800;color:var(--gold)">Campeã de ${monthLabel(S.monthChampion.month)}</div>
        <div style="font-size:11px;color:var(--muted2);margin-top:2px">Você venceu o ranking do mês passado! +150 FC de head start.</div>
      </div>
    </div>` : '';

  document.getElementById('tab-painel').innerHTML=`
    <div class="shdr"><div class="sdot"></div><h3>${p.emoji} ${p.name}</h3><div class="sbadge">${p.schedule}</div></div>
    ${champBadgeHtml}
    <div class="lvl-row">
      ${lvBadge(p.fitcoins||0)}
      <div class="lvl-info">
        <div class="lvl-nr"><span class="lvl-name">${lv.ico} ${lv.name}</span><span class="lvl-xp">${lv.n===5?'MAX 👑':`${lvp.cur}/${lvp.max} FC`}</span></div>
        ${pbar(lvp.pct,'5px')}
      </div>
      <div class="streak-pill">🔥 ${p.streak||0}</div>
    </div>

    <div class="shdr"><div class="sdot"></div><h3>Hoje</h3></div>
    ${todayHtml}

    <div class="card" style="${indPct>=100?'border-color:var(--green);background:#071A0F':''}">
      <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:6px">
        <span style="font-size:13px;font-weight:700">🎯 Cota Individual — ${fmtMoney(pIndQuota)}</span>
        <span style="font-size:13px;font-weight:800;color:${cc(indPct)==='g'?'var(--green)':cc(indPct)==='a'?'var(--amber)':'var(--red)'}">${indPct}%</span>
      </div>
      ${pbar(indPct,'7px')}
      <div style="display:flex;justify-content:space-between;font-size:11px;color:var(--muted2);margin-top:5px">

      </div>

        <span style="font-size:12px;color:var(--muted2)">💰 Bônus em dinheiro</span>
        <span style="font-size:15px;font-weight:800;color:${indPct>=100?'var(--green)':'var(--gold)'}">
          ${indPct>=100?'✅ R$500 conquistados!':'R$500 ao bater a meta'}
        </span>
      </div>
    </div>

    <div class="shdr"><div class="sdot"></div><h3>Resultados do Mês</h3></div>
    ${verifiedMetrics.map(m=>{
      const cur=monthStat(pid,m.key), pct=Math.min(100,Math.round((cur/m.mt)*100));
      return `<div class="pmcard">
        <div class="pmcard-hdr"><div class="pmcard-name">${m.e} ${m.label}</div><div class="pmcard-pct ${cc(pct)}">${pct}%</div></div>

    <div class="shdr" style="margin-top:4px"><div class="sdot"></div><h3>Atividade do Mês <span style="font-size:10px;color:var(--muted);font-weight:400;text-transform:none">(visibilidade)</span></h3></div>

function getActiveDate(){ return reportDate || today(); }

function renderReport(){
  const pid=S.currentPlayer, p=S.players[pid];
  const activeDate = getActiveDate();
  const r=getReport(pid, activeDate), cfg=curCfg();
  const v=r||{};
  const totalVal=repTotal(v);

  // Seletor de datas — dias 1 até hoje no mês atual
  const todayStr = today();
  const [y,m] = todayStr.split('-');
  const daysInMonth = new Date(parseInt(y), parseInt(m), 0).getDate();
  const maxDay = parseInt(todayStr.split('-')[2]);
  const dayButtons = Array.from({length: maxDay}, (_,i) => {
    const d = String(i+1).padStart(2,'0');
    const dateStr = `${y}-${m}-${d}`;
    const hasReport = !!getReport(pid, dateStr);
    const isToday = dateStr === todayStr;
    const isSelected = dateStr === activeDate;
    return `<button type="button" onclick="selectReportDate('${dateStr}')" style="
      flex-shrink:0;width:38px;height:44px;border-radius:var(--rs);border:2px solid ${isSelected?'var(--gold)':hasReport?'#2A4A2A':'#2A2A2A'};

    <div style="background:var(--card);border:1px solid ${isToday?'#242424':'var(--gold-d)'};border-radius:var(--rs);padding:8px 12px;margin-bottom:12px;display:flex;align-items:center;justify-content:space-between">
      <span style="font-size:14px;font-weight:800;color:${isToday?'var(--text)':'var(--gold)'}">${dateLabelFull}</span>
      ${!isToday?`<span style="font-size:11px;color:var(--amber)">⚠️ Preenchimento retroativo</span>`:''}
    </div>

    ${r?`<div class="already-badge"><strong>${isToday?'✅ Report de hoje':'✅ Report do dia'} enviado às ${r.submittedAt}</strong>Ganhou <strong style="color:var(--gold)">${r.fcEarned} FC</strong> — edite abaixo para corrigir.</div>`:''}

    <form onsubmit="submitReport(event)">
      <div class="shdr" style="margin-top:0"><div class="sdot"></div><h3>Resultados Verificáveis ✅</h3></div>

      <div class="frow">

          <div class="flabel">Novas Matrículas <span class="hint">+${fc('matricula')} FC/un.</span></div>
          <input class="finput" type="number" id="f_qtdma" min="0" value="${v.qtdMatriculas||''}" placeholder="0">

      <div class="frow">

        </div>
        <div class="fgroup">
          <div class="flabel">Plano 72 créditos <span class="hint">+${fc('plano72')} FC · ×2 gatilho</span></div>

      ${(()=>{
        const m=getDailyMission();

function renderLoja(){
  const pid=S.currentPlayer, p=S.players[pid], fc_=p.fitcoins||0;
  const store=getStore();
  const pendIds=S.resgates.filter(r=>r.pid===pid&&r.status==='pending').map(r=>r.itemId);
  const tiers=[
    {key:'bronze',label:'Bronze',range:'100–299 FC',ico:'🥉',cls:'tb-bronze'},
    {key:'prata', label:'Prata', range:'300–599 FC',ico:'🥈',cls:'tb-prata'},
    {key:'ouro',  label:'Ouro',  range:'600–999 FC',ico:'🥇',cls:'tb-ouro'},
    {key:'elite', label:'Elite', range:'1.000+ FC', ico:'👑',cls:'tb-elite'},
  ];
  const storeHtml=tiers.map(tier=>{
    const items=store.filter(i=>i.tier===tier.key);
    if(!items.length) return '';
    return `<div style="margin-bottom:20px">
      <div class="tier-badge ${tier.cls}">${tier.ico} ${tier.label} · ${tier.range}</div>
      ${items.map(item=>{
        const can=fc_>=item.cost, pend=pendIds.includes(item.id);
        return `<div class="sitem ${pend?'pend':can?'can':'cant'}">
          <div class="si-ico">${item.ico}</div>
          <div class="si-info">
            <div class="si-name">${item.name}</div>
            <div class="si-partner">📍 ${item.partner}</div>
            <div class="si-desc">${item.desc}</div>
          </div>
          <div class="si-right">
            <div class="si-cost">${item.cost}</div>
            <div class="si-cost-l">FitCoins</div>
            <button class="btn-resgate${pend?' pend':''}" onclick="resgate('${item.id}')" ${(!can||pend)?'disabled':''}>
              ${pend?'⏳ Pendente':can?'Resgatar':'🔒'}
            </button>
          </div>
        </div>`;
      }).join('')}
    </div>`;
  }).join('');
  const myRes=S.resgates.filter(r=>r.pid===pid).slice().reverse();
  const saquePend=S.resgates.some(r=>r.pid===pid&&r.type==='saque'&&r.status==='pending');
  const rate=fc('saqueRate')/100;
  const pIndQuota=getPlayerIndQuota(pid);
  const bateuCota=monthRev(pid)>=pIndQuota;
  const bonusPend=S.resgates.some(r=>r.pid===pid&&r.type==='bonus_cota'&&r.date.startsWith(monthKey()));
  const bonusAprov=S.resgates.some(r=>r.pid===pid&&r.type==='bonus_cota'&&r.date.startsWith(monthKey())&&r.status==='approved');
  const bonusCard=`
    <div style="margin-bottom:20px">
      <div class="tier-badge" style="background:linear-gradient(90deg,#1a2a0a,#2a4a10);color:#a3e635;border:1px solid #3a6a15">🏆 Bônus de Cota Individual · R$500 fixo</div>
      <div class="sitem ${bonusPend?'pend':bateuCota?'can':'cant'}" style="border-color:${bonusAprov?'var(--green)':bonusPend?'var(--amber)':bateuCota?'#3a6a15':'#2A2A2A'}">
        <div class="si-ico">💰</div>
        <div class="si-info">
          <div class="si-name">Bônus de Cota Individual</div>
          <div class="si-partner">via Pix · aprovado pelo gestor</div>
          <div class="si-desc">${bateuCota?'✅ Você bateu sua cota de '+fmtMoney(pIndQuota)+'!':'Bata sua cota de '+fmtMoney(pIndQuota)+' para desbloquear'}</div>
        </div>
        <div class="si-right">
          <div class="si-cost" style="color:#a3e635">500,00</div>
          <div class="si-cost-l">R$ fixo</div>
          <button class="btn-resgate${bonusPend?' pend':''}" onclick="requestBonusCota()" ${(!bateuCota||bonusPend)?'disabled':''} style="${bateuCota&&!bonusPend?'background:#a3e635;color:#000':''}">
            ${bonusAprov?'✅ Aprovado':bonusPend?'⏳ Pendente':bateuCota?'Solicitar':'🔒'}
          </button>
        </div>
      </div>
    </div>`;
  const saqueCard=`
    <div style="margin-bottom:20px">
      <div class="tier-badge" style="background:linear-gradient(90deg,#1a3a1a,#2a5a2a);color:#4ade80;border:1px solid #2a5a2a">💵 Saque em Dinheiro · 1x por mês</div>
      <div class="sitem ${saquePend?'pend':fc_>=100?'can':'cant'}" style="border-color:${saquePend?'var(--amber)':fc_>=100?'#2a5a2a':'#2A2A2A'}">
        <div class="si-ico">💵</div>
        <div class="si-info">
          <div class="si-name">Saque em Dinheiro</div>
          <div class="si-partner">via Pix · aprovado pelo gestor</div>
          <div class="si-desc">R$${rate.toFixed(2)} por FC · mínimo 100 FC (R$${(100*rate).toFixed(2)}) · Você escolhe quanto sacar</div>
        </div>
        <div class="si-right">
          <div class="si-cost" style="color:#4ade80">${(fc_*rate).toFixed(2)}</div>
          <div class="si-cost-l">R$ máx.</div>
          <button class="btn-resgate${saquePend?' pend':''}" onclick="resgateSaque()" ${(fc_<100||saquePend)?'disabled':''} style="${fc_>=100&&!saquePend?'background:#4ade80;color:#000':''}">
            ${saquePend?'⏳ Pendente':fc_>=100?'Sacar':'🔒 Mín. 100 FC'}
          </button>
        </div>
      </div>
    </div>`;
  document.getElementById('tab-loja').innerHTML=`
    <div class="fc-bal">
      <div><div class="fcb-l">Seu saldo</div><div class="fcb-v">${fc_} <small>FitCoins</small></div></div>
      ${lvBadge(fc_)}
    </div>
    <div class="shdr"><div class="sdot"></div><h3>Catálogo</h3><div class="sbadge">Parceiros</div></div>
    ${bonusCard}
    ${saqueCard}
    ${storeHtml}
    <div class="shdr" style="margin-top:4px"><div class="sdot"></div><h3>Meus Resgates</h3></div>
    ${myRes.length?myRes.map(r=>`<div class="res-item">
      <div class="res-name">${r.itemName}</div>
      <div style="text-align:right"><div class="res-date">${fmtDate(r.date)}</div><div class="${r.status==='pending'?'badge-pend':'badge-ok'}">${r.status==='pending'?'⏳ Pendente':'✅ Aprovado'}</div></div>
      <div style="font-size:13px;font-weight:700;color:var(--red)">−${r.cost} FC</div>
    </div>`).join(''):
    `<div class="empty"><div class="big">🛍️</div>Nenhum resgate ainda.</div>`}`;
}

];

function openAdmin(){
  if(!adminUnlocked){
    document.getElementById('pwPromptText').textContent = S.adminPassword ? 'Digite a senha de administrador' : 'Crie uma senha de administrador';
    document._pwMode = S.adminPassword ? 'check' : 'set';
    document.getElementById('pwModal').classList.add('show');
    document.getElementById('pwInput').value='';
    document.getElementById('pwError').classList.remove('show');
    setTimeout(()=>document.getElementById('pwInput').focus(),200);
  } else {
    showAdminPanel();
  }
}
function pwSubmit(){
  const val=document.getElementById('pwInput').value.trim();
  if(!val){ document.getElementById('pwError').textContent='Digite uma senha'; document.getElementById('pwError').classList.add('show'); return; }
  if(document._pwMode==='set'){
    S.adminPassword=val; save(); closePwModal(); adminUnlocked=true; showAdminPanel();
  } else {
    if(val===S.adminPassword){ closePwModal(); adminUnlocked=true; showAdminPanel(); }
    else { document.getElementById('pwError').textContent='Senha incorreta'; document.getElementById('pwError').classList.add('show'); document.getElementById('pwInput').value=''; }
  }
}
function closePwModal(){ document.getElementById('pwModal').classList.remove('show'); }
function showAdminPanel(){ renderAdminTabs(); renderAdminContent(); document.getElementById('adminOv').classList.add('show'); document.getElementById('btnAdmin').className='btn-admin unlocked'; }

function renderAdminMissoes(){
  const el = document.getElementById('adminContent');
  if(!window._adminMissoesMes) window._adminMissoesMes = monthKey();
  const curMes = window._adminMissoesMes;

  // Months with missions + current month
  const mesSet = new Set([monthKey()]);
  Object.keys(S.missions||{}).forEach(k=>mesSet.add(k.slice(0,7)));
  const meses = [...mesSet].sort();

  const [yr, mo] = curMes.split('-').map(Number);
  const daysInMonth = new Date(yr, mo, 0).getDate();

  const rows = [];
  for(let d=1; d<=daysInMonth; d++){
    const dateStr = `${curMes}-${String(d).padStart(2,'0')}`;
    const m = (S.missions||{})[dateStr] || {w:'', focus:'', desc:'', tasks:['','','']};
    rows.push(`
      <div style="background:var(--card);border:1px solid #242424;border-radius:var(--rs);padding:12px;margin-bottom:8px" id="mrow_${dateStr}">
        <div style="display:flex;align-items:center;gap:8px;margin-bottom:8px">
          <span style="font-size:13px;font-weight:800;color:var(--gold);min-width:28px">Dia ${d}</span>
          <input id="mw_${dateStr}" value="${m.w||''}" placeholder="🔥" style="width:42px;background:var(--card2);border:1px solid #333;border-radius:6px;padding:6px;color:var(--text);font-size:16px;text-align:center">
          <input id="mf_${dateStr}" value="${(m.focus||'').replace(/"/g,'&quot;')}" placeholder="Foco do dia" style="flex:1;background:var(--card2);border:1px solid #333;border-radius:6px;padding:6px;color:var(--text);font-size:13px;font-weight:700">
        </div>
        <textarea id="md_${dateStr}" placeholder="Descrição estratégica..." rows="2" style="width:100%;background:var(--card2);border:1px solid #333;border-radius:6px;padding:6px;color:var(--text);font-size:12px;resize:none;margin-bottom:6px;box-sizing:border-box">${m.desc||''}</textarea>
        <div style="display:flex;flex-direction:column;gap:4px;margin-bottom:8px">
          ${[0,1,2].map(i=>`<input id="mt${i}_${dateStr}" value="${((m.tasks||[])[i]||'').replace(/"/g,'&quot;')}" placeholder="Tarefa ${i+1}" style="background:var(--card2);border:1px solid #2a2a2a;border-radius:6px;padding:6px 8px;color:var(--muted2);font-size:12px">`).join('')}
        </div>
        <button onclick="saveDayMission('${dateStr}')" style="background:var(--gold);color:#000;border:none;border-radius:20px;padding:5px 16px;font-size:12px;font-weight:800;cursor:pointer">Salvar</button>
        <span id="msaved_${dateStr}" style="font-size:11px;color:var(--green);margin-left:8px;display:none">✓ Salvo</span>
      </div>`);
  }

  el.innerHTML=`
    <div class="shdr"><div class="sdot"></div><h3>Calendário de Missões</h3></div>
    <p style="font-size:12px;color:var(--muted2);margin-bottom:12px">Defina o foco e as 3 tarefas de cada dia. Aparece no Dashboard e no Report das vendedoras.</p>
    <div style="margin-bottom:14px;display:flex;gap:8px;flex-wrap:wrap">
      ${meses.map(m=>`<button onclick="window._adminMissoesMes='${m}';renderAdminContent()" style="padding:6px 14px;border-radius:20px;border:1px solid ${m===curMes?'var(--gold)':'#333'};background:${m===curMes?'#1C1800':'var(--card)'};color:${m===curMes?'var(--gold)':'var(--muted2)'};font-size:12px;font-weight:700;cursor:pointer">${monthLabel(m)}</button>`).join('')}
      <button onclick="addMissionMonth()" style="padding:6px 14px;border-radius:20px;border:1px solid #333;background:var(--card);color:var(--muted2);font-size:12px;font-weight:700;cursor:pointer">+ Novo mês</button>
    </div>
    ${rows.join('')}`;
}

function saveDayMission(dateStr){
  if(!S.missions) S.missions = {};
  const tasks = [0,1,2].map(i=>(document.getElementById(`mt${i}_${dateStr}`)?.value||'').trim()).filter(t=>t);
  S.missions[dateStr] = {
    w:     (document.getElementById(`mw_${dateStr}`)?.value||'').trim(),
    focus: (document.getElementById(`mf_${dateStr}`)?.value||'').trim(),
    desc:  (document.getElementById(`md_${dateStr}`)?.value||'').trim(),
    tasks,
  };
  save();
  const el = document.getElementById(`msaved_${dateStr}`);
  if(el){ el.style.display='inline'; setTimeout(()=>el.style.display='none', 2000); }
}

function addMissionMonth(){
  const cur = window._adminMissoesMes || monthKey();
  const [yr, mo] = cur.split('-').map(Number);
  const next = mo === 12
    ? `${yr+1}-01`
    : `${yr}-${String(mo+1).padStart(2,'0')}`;
  window._adminMissoesMes = next;
  renderAdminContent();
}

function openCustomTriggerForm(editIdx=-1){
  document.getElementById('ct_editIdx').value = editIdx;
  document.getElementById('ctFormTitle').textContent = editIdx>=0 ? 'Editar Gatilho' : 'Novo Gatilho';
  if(editIdx>=0){
    const t = S.customTriggers[editIdx];
    document.getElementById('ct_label').value = t.label||'';
    document.getElementById('ct_sub').value   = t.sub||'';
    document.getElementById('ct_type').value  = t.type||'valor';
    document.getElementById('ct_fc').value    = t.fc||'';
    renderCTFields();
    setTimeout(()=>{
      if(t.type==='valor'||t.type==='quantidade') document.getElementById('ct_threshold').value = t.threshold||'';
      if(t.type==='quantidade') document.getElementById('ct_field').value = t.field||'qtdMatriculas';
      if(t.type==='sequencia') document.getElementById('ct_days').value = t.days||'';
    },0);
  } else {
    document.getElementById('ct_label').value = '';
    document.getElementById('ct_sub').value   = '';
    document.getElementById('ct_type').value  = 'valor';
    document.getElementById('ct_fc').value    = '';
    renderCTFields();
  }
  document.getElementById('ctForm').style.display='block';
}

function saveCustomTrigger(){
  const type  = document.getElementById('ct_type').value;
  const label = document.getElementById('ct_label').value.trim();
  const sub   = document.getElementById('ct_sub').value.trim();
  const fc    = parseInt(document.getElementById('ct_fc').value)||0;
  if(!label){ showToast('Dê um nome ao gatilho.',true); return; }
  if(!fc){ showToast('Defina o valor em FC.',true); return; }
  const t = { label, sub, type, fc, enabled:true };
  if(type==='valor'||type==='quantidade') t.threshold = parseFloat(document.getElementById('ct_threshold')?.value)||0;
  if(type==='quantidade') t.field = document.getElementById('ct_field')?.value||'qtdMatriculas';
  if(type==='sequencia') t.days = parseInt(document.getElementById('ct_days')?.value)||2;
  if(!S.customTriggers) S.customTriggers=[];
  const idx = parseInt(document.getElementById('ct_editIdx').value);
  if(idx>=0) S.customTriggers[idx]={...S.customTriggers[idx],...t};
  else S.customTriggers.push(t);
  save(); showToast('✅ Gatilho salvo!');
  document.getElementById('ctForm').style.display='none';
  switchAdminTab('fc');
}

function applyFCAdj(pid){
  const p=S.players.find(x=>x.id===pid);
  const val=parseInt(document.getElementById(`adj_fc_${pid}`).value);
  const mot=document.getElementById(`adj_mot_${pid}`).value.trim()||'Ajuste manual';
  if(!val||isNaN(val)){ showToast('Digite um valor de FC',true); return; }
  const novo=Math.max(0,(p.fitcoins||0)+val);
  p.fitcoins=novo;
  S.resgates.push({pid,type:'ajuste',itemId:'__ajuste__',itemName:`⚙️ Ajuste: ${mot}`,cost:-val,date:today(),status:'approved'});
  if(!S.adjNotifs) S.adjNotifs={};
  if(!S.adjNotifs[pid]) S.adjNotifs[pid]=[];
  S.adjNotifs[pid].push({val,mot,date:today()});
  save(); renderAdminContent(); renderAll();
  showToast(`${val>0?'+':''}${val} FC para ${p.name} ✅`);
}
function approveResgate(idx){ S.resgates[idx].status='approved'; save(); showToast('✅ Aprovado!'); renderAdminContent(); renderAll(); }
function rejectResgate(idx){ const r=S.resgates[idx]; S.players[r.pid].fitcoins=(S.players[r.pid].fitcoins||0)+r.cost; r.status='rejected'; save(); showToast('FC devolvidos.'); renderAdminContent(); renderAll(); }
function savePlayers(){
  if(!S.pins) S.pins = { 0:'', 1:'', 2:'' };
  S.players.forEach((p,i)=>{
    const n   = document.getElementById(`cfg_name_${i}`)?.value.trim();
    const e   = document.getElementById(`cfg_emoji_${i}`)?.value.trim();
    const pin = (document.getElementById(`cfg_pin_${i}`)?.value || '').replace(/\D/g,'');
    if(n) p.name  = n;
    if(e) p.emoji = e;
    const quota = parseFloat(document.getElementById(`cfg_quota_${i}`)?.value);
    if(quota > 0) p.indQuota = quota;
    // PIN salvo em S.pins separado — não mistura com player data
    if(pin.length === 4) S.pins[i] = pin;

  save();
  showToast('✅ Salvo!');
  setTimeout(()=>renderAdminContent(), 300);
}

function closeAdminEdit(){
  document.getElementById('adminEditModal').style.display = 'none';
  _aeState = {};

function saveAdminEdit(){
  const { pid, date, rep } = _aeState;
  if(pid === undefined || !date) return;
  const p = S.players.find(x=>x.id===pid);

  // Devolve FC do report anterior
  if(rep.fcEarned) p.fitcoins = Math.max(0, (p.fitcoins||0) - rep.fcEarned);

  // Monta novo report
  const newRep = {
    ...rep,
    qtdMatriculas:        parseInt(document.getElementById('ae_ma').value)||0,
    qtdRenovacoes:        parseInt(document.getElementById('ae_re').value)||0,
    qtdRenovacoesUpgrade: parseInt(document.getElementById('ae_ru').value)||0,
    qtdPlano72:           parseInt(document.getElementById('ae_p72').value)||0,
    aulaExp:              parseInt(document.getElementById('ae_ae').value)||0,
    qtdCampanhas:         parseInt(document.getElementById('ae_ca').value)||0,
    qtdPostagens:         parseInt(document.getElementById('ae_po').value)||0,
    valorTotal:           parseFloat(document.getElementById('ae_vtotal').value)||0,
    editedByAdmin:    true,
    editedAt:         new Date().toLocaleTimeString('pt-BR',{hour:'2-digit',minute:'2-digit'}),
  };

  // Recalcula FC
  const result = calcFC(pid, newRep);
  newRep.fcEarned = result.total;
  newRep.fcBreakdown = result.items;
  p.fitcoins = (p.fitcoins||0) + result.total;

  S.reports[`${pid}_${date}`] = newRep;
  save();
  showToast('✅ Report corrigido!');
  closeAdminEdit();
  switchAdminTab('diario');
}

function clearPin(i){
  if(!S.pins) S.pins = { 0:'', 1:'', 2:'' };
  S.pins[i] = '';
  save();
  showToast(`PIN de ${S.players[i].name} removido.`);

function changePassword(){ const p1=document.getElementById('cfg_pw1').value.trim(), p2=document.getElementById('cfg_pw2').value.trim(); if(!p1){ showToast('Digite uma senha',true); return; } if(p1!==p2){ showToast('Senhas não coincidem',true); return; } S.adminPassword=p1; save(); showToast('🔐 Senha alterada!'); }
function saveCfoPin(){ const pin=document.getElementById('cfg_cfo_pin').value.trim(); if(pin&&pin.length!==4){ showToast('PIN deve ter 4 dígitos',true); return; } S.cfoPin=pin; save(); showToast(pin?'📊 PIN do CFO salvo!':'PIN do CFO removido.'); }
function resetDay(){
  if(!confirm('Apagar reports de hoje? Os FitCoins do dia também serão devolvidos.')) return;
  S.players.forEach(p=>{
    const key = `${p.id}_${today()}`;
    const r   = S.reports[key];
    if(r && r.fcEarned){
      p.fitcoins = Math.max(0, (p.fitcoins||0) - r.fcEarned);
    }
    delete S.reports[key];
  });
  save(); showToast('Report e FitCoins do dia resetados.'); renderAll();
}

function resetMonth(){
  if(!confirm('Limpar mês atual? FitCoins do mês serão devolvidos.')) return;
  const mk = monthKey();
  S.players.forEach(p=>{
    // Devolve FC de todos os reports do mês
    Object.keys(S.reports).forEach(k=>{
      if(k.startsWith(`${p.id}_${mk}`)){
        const r = S.reports[k];
        if(r && r.fcEarned) p.fitcoins = Math.max(0, (p.fitcoins||0) - r.fcEarned);
        delete S.reports[k];
      }
    });
  });
  save(); showToast('Mês limpo.'); renderAll();
}

function resetAll(){
  if(!confirm('🔄 ZERAR DADOS OPERACIONAIS?\n\nIsso vai apagar:\n• Todos os reports\n• FitCoins de todas as jogadoras\n• Resgates e histórico\n\nVai MANTER:\n• PINs\n• Nomes e emojis\n• Prêmios da loja\n• Configurações de metas')) return;

  // Zera apenas dados operacionais — mantém configurações
  S.players.forEach(p=>{ p.fitcoins=0; p.streak=0; p.lastReportDate=null; });
  S.reports      = {};
  S.resgates     = [];
  S.monthArchive = {};
  S.pendingBonus = null;
  S.lastAutoClose= null;

  ['p43_local','p43_session'].forEach(k=>{ try{ localStorage.removeItem(k); }catch(e){} });
  save();
  showToast('Dados zerados. Configurações mantidas ✅');
  setTimeout(()=>location.reload(), 800);
}

function resetNuclear(){
  if(!confirm('💀 APAGAR ABSOLUTAMENTE TUDO?\n\nIsso inclui PINs, nomes, configurações e todos os dados.\nUsado apenas para recomeçar do zero.')) return;
  ['p43arena_v5','p43_local','p43_session'].forEach(k=>{ try{ localStorage.removeItem(k); }catch(e){} });
  ROOT.set(null).then(()=>location.reload()).catch(()=>location.reload());

function goTab(name){
  if(name !== 'report') reportDate = null;

let _pinTarget      = 0;
let _pinCurrent     = '';
let _pinFromWelcome = false;
let _pinMode        = 'player'; // 'player' | 'cfo'

function selectPlayer(i){
  const pin = getPlayerPin(i);
  if(!pin){
    doSelectPlayer(i);
    return;
  }
  // Se já é o jogador atual e PIN está definido, não precisa reautenticar
  // (já está "logado" — só pede PIN para trocar de perfil)
  if(i === S.currentPlayer) return;
  openPinModal(i);
}

function doSelectPlayer(i){
  S.currentPlayer = i;
  saveLocal();
  renderAll();
}

function openPinModal(targetIdx){
  _pinTarget  = targetIdx;
  _pinCurrent = '';
  const p = S.players[targetIdx];
  document.getElementById('pinAvatar').textContent     = p.emoji;
  document.getElementById('pinPlayerName').textContent = p.name;
  document.getElementById('pinError').textContent      = '';
  updatePinDots('');
  document.getElementById('pinModal').classList.add('show');
}

function closePinModal(){
  document.getElementById('pinModal').classList.remove('show');
  _pinCurrent = '';
}

function pinKey(digit){
  if(_pinCurrent.length >= 4) return;
  _pinCurrent += digit;
  updatePinDots(_pinCurrent);
  if(_pinCurrent.length === 4) setTimeout(checkPin, 120);
}

function pinDel(){
  _pinCurrent = _pinCurrent.slice(0,-1);
  updatePinDots(_pinCurrent);
  document.getElementById('pinError').textContent = '';
}

function updatePinDots(val, state=''){
  for(let i=0;i<4;i++){
    const d = document.getElementById(`pd${i}`);
    d.className = 'pin-dot' + (i<val.length?' filled':'') + (state==='error'?' error':'');
  }
}

function checkPin(){
  if(_pinMode === 'cfo'){
    if(_pinCurrent === S.cfoPin){
      closePinModal();
      finalizeCFOLogin();
    } else {
      updatePinDots('1234','error');
      document.getElementById('pinError').textContent = 'PIN incorreto — tente novamente';
      setTimeout(()=>{ _pinCurrent=''; updatePinDots(''); document.getElementById('pinError').textContent=''; }, 900);
    }
    return;
  }
  const correct = getPlayerPin(_pinTarget);
  if(_pinCurrent === correct){
    closePinModal();
    if(_pinFromWelcome){
      _pinFromWelcome = false;
      finalizeLogin(_pinTarget);
    } else {
      doSelectPlayer(_pinTarget);
      showToast(`Olá, ${S.players[_pinTarget].name}! 👋`);
    }
  } else {
    updatePinDots('1234','error');
    document.getElementById('pinError').textContent = 'PIN incorreto — tente novamente';
    setTimeout(()=>{
      _pinCurrent = '';
      updatePinDots('');
      document.getElementById('pinError').textContent = '';
    }, 900);
  }
}

  if(!S.cfoPin){

  _pinMode = 'cfo';
  _pinCurrent = '';
  _pinFromWelcome = true;
  document.getElementById('pinAvatar').textContent     = '📊';

DB.ref('.info/connected').on('value', snap=>{
  const dot = document.getElementById('connDot');

  if(snap.val()===true){ dot.className='conn-dot online'; dot.title='Online ✅'; }

let _firstLoad = true;
ROOT.on('value', snapshot=>{
  const data = snapshot.val();
  if(data) mergeFirebaseData(data);
  if(_firstLoad){
    _firstLoad = false;
    seedMissionsIfEmpty();
    document.getElementById('loadingScreen').style.display = 'none';
    // Verifica sessão salva no dispositivo
    const session = loadSession();
    if(session && session.player != null){
      S.currentPlayer = session.player;
      saveLocal();
      goTab(S.currentTab||'dashboard');
    } else {
      // Sem sessão → mostra tela de boas-vindas
      goTab('dashboard');
      showWelcomeScreen();
    }
  } else {
    renderAll();
  }
});

// Timeout de segurança: se Firebase demorar mais de 6s, mostra o app mesmo assim
setTimeout(()=>{
  if(_firstLoad){
    _firstLoad = false;
    document.getElementById('loadingScreen').style.display='none';
    const session = loadSession();
    if(session && session.player != null){
      S.currentPlayer = session.player;
      goTab(S.currentTab||'dashboard');
    } else {
      goTab('dashboard');
      showWelcomeScreen();
    }
    showToast('Modo offline — dados locais',true);
  }
},6000);
